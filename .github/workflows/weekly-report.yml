name: Weekly Analysis Report

on:
  schedule:
    - cron: '0 12 * * 0'  # 매주 일요일 21:00 KST (= UTC 12:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google token
        run: printf '%s' "${{ secrets.GOOGLE_TOKEN_B64 }}" | base64 -d > token.json

      - name: Verify token file
        run: |
          if [ ! -s token.json ]; then
            echo "ERROR: token.json is empty - check GOOGLE_TOKEN_B64 secret"
            exit 1
          fi
          echo "token.json OK ($(wc -c < token.json) bytes)"

      - name: Run weekly report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
          NOTION_REPORT_DB_ID: ${{ secrets.NOTION_REPORT_DB_ID }}
          GOOGLE_TOKEN_PATH: token.json
        run: python3 main.py
