name: Weekly Analysis Report

on:
  schedule:
    - cron: '0 8 * * 0'  # 매주 일요일 17:00 KST (= UTC 08:00)
  workflow_dispatch:
    inputs:
      report_date:
        description: '분석할 날짜 (YYYY-MM-DD). 비우면 오늘 기준 이번 주.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/387935111543/locations/global/workloadIdentityPools/han-seonyeong/providers/github'
          service_account: 'weekly-report@clau-495201.iam.gserviceaccount.com'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
          NOTION_REPORT_DB_ID: ${{ secrets.NOTION_REPORT_DB_ID }}
          REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: python3 main.py
