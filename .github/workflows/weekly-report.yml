name: Weekly Analysis Report

on:
  schedule:
    - cron: '0 12 * * 0'  # 매주 일요일 21:00 KST (= UTC 12:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Google credentials
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          echo "CLIENT_ID length: ${#GOOGLE_CLIENT_ID}"
          echo "CLIENT_ID starts: ${GOOGLE_CLIENT_ID:0:15}"
          echo "CLIENT_SECRET length: ${#GOOGLE_CLIENT_SECRET}"
          echo "REFRESH_TOKEN length: ${#GOOGLE_REFRESH_TOKEN}"
          curl -s -X POST https://oauth2.googleapis.com/token \
            -d "grant_type=refresh_token" \
            --data-urlencode "client_id=${GOOGLE_CLIENT_ID}" \
            --data-urlencode "client_secret=${GOOGLE_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${GOOGLE_REFRESH_TOKEN}"

      - name: Refresh Google token and write token.json
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, requests
          from datetime import datetime, timezone, timedelta

          client_id = os.environ['GOOGLE_CLIENT_ID']
          client_secret = os.environ['GOOGLE_CLIENT_SECRET']
          refresh_token = os.environ['GOOGLE_REFRESH_TOKEN']

          r = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': client_id,
              'client_secret': client_secret,
              'refresh_token': refresh_token,
              'grant_type': 'refresh_token',
          })
          data = r.json()
          if 'access_token' not in data:
              raise Exception(f'Token refresh failed: {data}')

          token_data = {
              'token': data['access_token'],
              'refresh_token': refresh_token,
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': client_id,
              'client_secret': client_secret,
              'scopes': ['https://www.googleapis.com/auth/calendar.readonly'],
              'universe_domain': 'googleapis.com',
              'account': '',
              'expiry': (
                  datetime.now(timezone.utc) + timedelta(seconds=data.get('expires_in', 3600))
              ).strftime('%Y-%m-%dT%H:%M:%S.%fZ'),
          }
          with open('token.json', 'w') as f:
              json.dump(token_data, f)
          print('Google token refreshed OK')
          EOF

      - name: Run weekly report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
          NOTION_REPORT_DB_ID: ${{ secrets.NOTION_REPORT_DB_ID }}
          GOOGLE_TOKEN_PATH: token.json
        run: python3 main.py
