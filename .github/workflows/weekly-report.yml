name: Weekly Analysis Report

on:
  schedule:
    - cron: '0 12 * * 0'  # 매주 일요일 21:00 KST (= UTC 12:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google token
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python3 -c "import os; open('token.json','w').write(os.environ['GOOGLE_TOKEN_JSON'])"

      - name: Refresh Google token
        run: |
          python3 - <<'EOF'
          import json, requests
          from datetime import datetime, timezone, timedelta

          with open('token.json') as f:
              tok = json.load(f)

          r = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': tok['client_id'],
              'client_secret': tok['client_secret'],
              'refresh_token': tok['refresh_token'],
              'grant_type': 'refresh_token',
          })
          data = r.json()
          if 'access_token' not in data:
              raise Exception(f'Token refresh failed: {data}')

          tok['token'] = data['access_token']
          tok['expiry'] = (
              datetime.now(timezone.utc) + timedelta(seconds=data.get('expires_in', 3600))
          ).strftime('%Y-%m-%dT%H:%M:%S.%fZ')

          with open('token.json', 'w') as f:
              json.dump(tok, f)
          print('Google token refreshed OK')
          EOF

      - name: Run weekly report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
          NOTION_REPORT_DB_ID: ${{ secrets.NOTION_REPORT_DB_ID }}
          GOOGLE_TOKEN_PATH: token.json
        run: python3 main.py
